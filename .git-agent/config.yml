scopes:
    - name: xcode
      description: Xcode project configuration, workspace settings, and build files; does not cover app source code or platform-specific configs.
    - name: shared
      description: Cross-platform SwiftUI app views, components, extensions, assets, and app entry point; does not cover platform-specific configs or tests.
    - name: tests
      description: Unit tests and test configuration for iOS and macOS targets; does not cover app source code.
    - name: ios
      description: iOS-specific configuration, Info.plist, and build settings; does not cover shared code or other platforms.
    - name: macos
      description: macOS-specific configuration, Info.plist, and entitlements; does not cover shared code or other platforms.
    - name: tvos
      description: tvOS-specific configuration and Info.plist; does not cover shared code or other platforms.
    - name: visionos
      description: visionOS-specific configuration and Info.plist; does not cover shared code or other platforms.
